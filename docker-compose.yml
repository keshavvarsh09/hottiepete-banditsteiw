services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/assets:/app/assets
      - ./backend/renders:/app/renders

  frontend:
    image: python:3.11-slim
    working_dir: /srv
    volumes:
      - ./frontend:/srv:ro
    ports:
      - "5173:5173"
    command: python -m http.server 5173
